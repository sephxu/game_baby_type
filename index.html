<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baby Type!</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div id="game">
    <div class="deco deco-paw-tl">🐾</div>
    <div class="deco deco-paw-br">🐾</div>
    <div class="deco deco-cloud-l">☁️</div>
    <div class="deco deco-cloud-r">☁️</div>
    <div class="deco deco-bone">🦴</div>
    <div id="card-container">
      <div id="letter-card">
        <div id="letter"></div>
        <img id="card-image" class="hidden" alt="">
        <div id="emoji-word"></div>
        <div id="card-sentence"></div>
      </div>
    </div>
    <div id="particles"></div>
    <div id="challenge-overlay"></div>
    <div id="flower-collection">
      <div id="flower-counter"></div>
      <div id="flower-row"></div>
    </div>
    <div id="parent-btn">&#9881;</div>
    <div id="parent-panel">
      <h3>Settings</h3>
      <label><input type="checkbox" id="mute-toggle"> Mute</label>
      <label><input type="checkbox" id="challenge-toggle" checked> Challenge Mode</label>
      <label>Vocab Library
        <select id="library-select">
          <option value="bluey">Bluey</option>
          <option value="emoji">Emoji</option>
        </select>
      </label>
      <div class="custom-word-section">
        <label for="custom-word-input">Add Word</label>
        <div class="custom-word-row">
          <input id="custom-word-input" type="text" autocomplete="off" placeholder="Blanket">
          <button id="custom-word-add" type="button">Add</button>
        </div>
        <div id="custom-word-status" class="custom-word-status" aria-live="polite"></div>
      </div>
      <hr class="panel-divider">
      <button class="reset-btn" id="flower-reset">Reset Flowers</button>
    </div>
    <div id="prompt">Press any key!</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
